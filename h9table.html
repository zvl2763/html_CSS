<!DOCTYPE html>
<html lang='en'>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">    
        <title>Table</title>
        <style>
            table{
                border:1px solid blue;
                font-family: Arial, Helvetica, sans-serif;
                border-collapse:collapse;
            }
            th,td{
                border:1px solid blue;
            }
            th{
                background-color: black;
                color:white;
                text-align: left;
            }
        </style>
    </head>
    <body>
        <table>
            <tr>
                <th> S No </th><th> Name </th><th> Age </th>
            </tr>
            <tr>
                <td>1</td><td>Rosamma Jacob</td><td>66</td>
            </tr>
            <tr>
                <td>2</td><td>Elviz George</td><td>41</td>
            </tr>
            <tr>
                <td>3</td><td>Nivish George</td><td>37</td>
            </tr>
        </table>
    </body>
</html>
